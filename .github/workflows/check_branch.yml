name: Check Branch Naming 🌳

on:
  push:
    branches:
      - '*'

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📦
        uses: actions/checkout@v3

      - name: Validate branch name ✅
        run: |
          BRANCH_NAME=${{ github.ref_name }}
          if [[ "$BRANCH_NAME" =~ ^(main|develop|feature/.*|task/.*|release/.*|hotfix/.*)$ ]]; then
            echo "Branch name '$BRANCH_NAME' is valid. ✅"
          else
            echo "Error: Branch name '$BRANCH_NAME' does not follow Gitflow naming conventions. ❌"
            exit 1
          fi